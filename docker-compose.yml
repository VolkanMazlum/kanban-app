services:
  db:
    image: postgres:16-alpine
    container_name: kanban_db
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d kanbandb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: kanban_backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 4000
      NODE_ENV: production
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: kanban_frontend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      AUTH_USERNAME: ${AUTH_USERNAME}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    ports:
      - "3000:80"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    container_name: kanban_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  ollama-pull-model:
    image: ollama/ollama:latest
    container_name: kanban_ollama_pull
    environment:
      - OLLAMA_HOST=ollama
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: /bin/sh
    command: -c "until ollama list > /dev/null 2>&1; do echo 'Waiting for ollama server...'; sleep 5; done; ollama pull gemma2:2b"
    depends_on:
      - ollama

volumes:
  postgres_data:
  ollama_data: